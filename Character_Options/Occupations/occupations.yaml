- name: Mibu Clan
  slug: mibu-clan
  status: active
  source_md: Mechanics/Character_Options/Occupations/Mibu Clan.md
  source_category: Core
  source_subcategory: null
  description: This immense clan said to be the direct descendant of God possesses
    more than a few bloodlines, some of which were what the very first independant
    Shinobi based their abilities on. The Mibu Clan has tacticians that possess the
    ability to read mind, soldiers with the ability to manipulate fire and water,
    others to make their skin into iron. The Ishimaru and Yachoumaru are direct descendants
    of the Mibu Clan, as is the Kyuushou Kousei bloodline. The Katsugan bloodline
    and Kagetsuki Clan were exiled failures of the clan's experiments. They hold no
    qualm to kidnapping humans and using them as guinea pigs for their experiments,
    tossing the failures in the massive forest surrounding the equally massive landmass
    that is the Clan's castlegrounds. The successes are welcomed with open arms, with
    promises of power and immortality, and sometimes a little more forcefully with
    an intense session of brainwashing. Furthermore, the Clan has a powerful sword
    style at its disposal, called the Muryou Saikyou Ryu. More than a few users of
    the Shinmei Ryu are also known to have ties with the Mibu.
  prerequisite: Age 8+
  skill_select_count: 2
  fixed_class_skills: []
