- name: Phenom
  slug: phenom
  status: active
  source_md: Mechanics/Character_Options/Occupations/Phenom.md
  source_category: Core
  source_subcategory: null
  description: From birth, you were gifted with incredible potential. You quickly
    set yourself apart from your peers as a prodigy and gained instant recognition;
    your very actions can influence the course of life around you. They say everyone
    gets their fifteen minutes of fame, but you got more. You are a prodigy, the product
    of extraordinary union or perhaps simply an astonishing happenstance; when people
    say 'one in every generation,' they're referring to you. Though your looks may
    be deceiving, you have been dealt an incredible hand, and have all the tools one
    could ever hope for to become a legendary ninja.
  prerequisite: Age 5+ and one ability score 15 or higher. The Phenom's age requirement
    is not subject to being reduced by the Genius Ninja feat, but he does not suffer
